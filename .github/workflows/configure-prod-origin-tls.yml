name: Configure Prod Origin TLS

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure nginx origin TLS on prod API host
        env:
          SSH_HOST: ${{ vars.PROD_API_ECS_HOST || vars.API_ECS_HOST || vars.ECS_HOST }}
          SSH_USER: ${{ vars.API_ECS_USER || vars.ECS_USER || vars.PROD_API_ECS_USER }}
          SSH_KEY: ${{ secrets.API_ECS_DEPLOY_SSH_KEY || secrets.ECS_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$SSH_HOST" || -z "$SSH_USER" || -z "$SSH_KEY" ]]; then
            echo "Missing SSH configuration" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          domain="huayangai-api.overdev.cn"
          cert_dir="/etc/nginx/ssl/$domain"
          conf_path="/etc/nginx/conf.d/${domain}-ssl.conf"

          echo "== host =="
          hostname
          whoami

          echo "== services =="
          systemctl is-active nginx || true
          systemctl is-active huayangai-api || true
          curl -fsS http://127.0.0.1/health || true
          echo

          sudo mkdir -p "$cert_dir"
          sudo openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout "$cert_dir/origin.key" \
            -out "$cert_dir/origin.crt" \
            -subj "/CN=$domain" \
            -addext "subjectAltName=DNS:$domain" >/dev/null 2>&1
          sudo chmod 600 "$cert_dir/origin.key"
          sudo chmod 644 "$cert_dir/origin.crt"

          sudo tee "$conf_path" >/dev/null <<NGINX
          server {
              listen 443 ssl http2;
              server_name $domain;

              ssl_certificate $cert_dir/origin.crt;
              ssl_certificate_key $cert_dir/origin.key;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers off;

              client_max_body_size 20m;

              location / {
                  proxy_pass http://127.0.0.1:8787;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
              }
          }
          NGINX

          sudo nginx -t
          sudo systemctl reload nginx

          echo "== verify local HTTPS =="
          curl -kfsS --resolve "$domain:443:127.0.0.1" "https://$domain/health"
          echo
          sudo nginx -T 2>/dev/null | sed -n "/server_name $domain/,/}/p" | sed -n '1,80p'
          REMOTE
